---
# roles/swap/tasks/main.yml

- name: "Check if swap file exists"
  ansible.builtin.stat:
    path: "{{ ansible_role_swap_file_path }}"
    get_attributes: false
    get_checksum: false
    get_mime: false
  register: ansible_role_swap_file

- name: "Check if swap is already active"
  ansible.builtin.command: "swapon --show=NAME --noheadings"
  register: ansible_role_swap_active_swaps
  changed_when: false
  failed_when: false

- name: "Determine if swap file is active"
  ansible.builtin.set_fact:
    ansible_role_swap_is_active: "{{ ansible_role_swap_active_swaps.stdout_lines | select('equalto', ansible_role_swap_file_path) | list | length > 0 }}"

- name: "Create swap file"
  when: not ansible_role_swap_file.stat.exists and not ansible_role_swap_is_active
  block:
    - name: "Create swap file using fallocate"
      ansible.builtin.command:
        cmd: "fallocate -l {{ ansible_role_swap_file_size_mb }}M {{ ansible_role_swap_file_path }}"
      changed_when: true
  rescue:
    - name: "Fail if fallocate failed and dd fallback is disabled"
      ansible.builtin.fail:
        msg: >-
          Creating the swap file with fallocate failed and
          ansible_role_swap_fallback_to_dd is disabled.
      when: not ansible_role_swap_fallback_to_dd | bool

    - name: "Create swap file using dd fallback"
      ansible.builtin.command:
        cmd: "dd if=/dev/zero of={{ ansible_role_swap_file_path }} bs=1M count={{ ansible_role_swap_file_size_mb }}"
      changed_when: true

- name: "Ensure correct permissions for swap file"
  ansible.builtin.file:
    path: "{{ ansible_role_swap_file_path }}"
    owner: root
    group: root
    mode: '0600'
  when: not ansible_role_swap_is_active

- name: "Format swap file"
  ansible.builtin.command: "mkswap -L {{ ansible_role_swap_label }} {{ ansible_role_swap_file_path }}"
  when: not ansible_role_swap_is_active
  changed_when: true

- name: "Activate swap file"
  ansible.builtin.command: "swapon {{ ansible_role_swap_file_path }}"
  when: ansible_role_swap_activate | default(true) and not ansible_role_swap_is_active
  changed_when: true

- name: "Ensure swap is in /etc/fstab"
  ansible.posix.mount:
    name: none
    src: "{{ ansible_role_swap_file_path }}"
    fstype: swap
    opts: sw
    state: present
  when: ansible_role_swap_add_fstab | default(true)

- name: "Set swappiness value"
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ ansible_role_swap_swappiness }}"
    state: present
    sysctl_file: /etc/sysctl.conf
  when: ansible_role_swap_swappiness is defined
